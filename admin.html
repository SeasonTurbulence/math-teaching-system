<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>后台管理 - 数学教学系统</title>
<style>
  :root {
    --primary: #6C5CE7; --primary-light: #A29BFE; --primary-bg: #F0EEFF;
    --success: #00B894; --success-bg: #E6F9F4;
    --warning: #FDCB6E; --warning-bg: #FFF8E7;
    --danger: #E17055; --danger-bg: #FEF0EC;
    --text: #2D3436; --text-secondary: #636E72; --text-muted: #B2BEC3;
    --bg: #F8F9FA; --card-bg: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.08);
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
    --font-xs: 11px; --font-sm: 12px; --font-md: 13px; --font-lg: 15px; --font-xl: 18px;
    --touch-min: 44px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); font-size: var(--font-md); line-height: 1.5; min-height: 100vh;
  }
  /* 导航 */
  .nav {
    background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; }
  .nav-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--danger), #FDCB6E); border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 700; }
  .nav-title { font-size: var(--font-lg); font-weight: 600; }
  .nav-subtitle { font-size: var(--font-xs); color: var(--text-secondary); }
  .nav-right { display: flex; align-items: center; gap: 8px; }
  .nav-link { font-size: var(--font-xs); color: var(--primary); text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: background 0.15s; }
  .nav-link:hover { background: var(--primary-bg); }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

  /* 标签页 */
  .tabs-wrap { margin-bottom: 18px; overflow: hidden; }
  .tabs { display: inline-flex; gap: 4px; background: var(--card-bg); border-radius: var(--radius-md); padding: 4px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .tab { padding: 8px 18px; border-radius: 10px; cursor: pointer; font-size: var(--font-md); color: var(--text-secondary); transition: all 0.2s; border: none; background: transparent; font-weight: 500; white-space: nowrap; min-height: var(--touch-min); display: flex; align-items: center; }
  .tab:hover { color: var(--text); background: rgba(0,0,0,0.03); }
  .tab.active { background: var(--primary); color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(108,92,231,0.3); }

  .panel { display: none; animation: fadeIn 0.25s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* 卡片 */
  .card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 14px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .card-title { font-size: var(--font-lg); font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* 按钮 */
  .btn { font-size: var(--font-xs); padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); cursor: pointer; font-weight: 500; min-height: var(--touch-min); display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; box-shadow: var(--shadow-sm); white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn:active { transform: scale(0.95); }
  .btn.primary { background: var(--primary); color: #fff; border-color: transparent; box-shadow: 0 2px 8px rgba(108,92,231,0.25); }
  .btn.primary:hover { background: #5A4BD1; }
  .btn.success { background: var(--success); color: #fff; border-color: transparent; }
  .btn.danger { background: var(--danger); color: #fff; border-color: transparent; }
  .btn.warning { background: var(--warning); color: var(--text); border-color: transparent; }
  .btn.sm { padding: 4px 10px; font-size: 10px; border-radius: 6px; min-height: 32px; }

  /* 状态条 */
  .status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: var(--radius-md); margin-bottom: 14px; font-size: var(--font-xs); }
  .status-bar.saved { background: var(--success-bg); color: var(--success); border: 1px solid rgba(0,184,148,0.15); }
  .status-bar.unsaved { background: var(--warning-bg); color: #E17055; border: 1px solid rgba(253,203,110,0.2); }

  /* 表格 */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: var(--font-sm); }
  th { text-align: left; padding: 10px 12px; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border); font-size: var(--font-xs); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(0,0,0,0.015); }
  .td-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-dot { width: 16px; height: 16px; border-radius: 4px; display: inline-block; vertical-align: middle; margin-right: 4px; border: 1px solid rgba(0,0,0,0.1); }
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }

  /* 展开区域 */
  .expand-section { margin-top: 8px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .expand-section h4 { font-size: var(--font-xs); font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; justify-content: space-between; }
  .sub-list { display: flex; flex-direction: column; gap: 6px; }
  .sub-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--card-bg); border-radius: 6px; border: 1px solid var(--border); font-size: var(--font-xs); flex-wrap: wrap; }
  .sub-item .info { flex: 1; min-width: 0; }
  .sub-item .info strong { font-size: var(--font-xs); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(2px); }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card-bg); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal h3 { font-size: var(--font-xl); font-weight: 600; margin-bottom: 16px; }
  .modal .close-btn { position: sticky; top: 0; float: right; width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); z-index: 1; }
  .modal .close-btn:hover { background: #e0e0e0; }

  /* 表单 */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: var(--font-xs); font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: var(--font-md); font-family: inherit; background: var(--bg);
    transition: border-color 0.15s; color: var(--text);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
  .form-group textarea { min-height: 70px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }

  /* Toast */
  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 300; background: var(--text); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: var(--font-sm); font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .toast.show { opacity: 1; }

  /* 响应式 */
  @media (max-width: 768px) {
    .nav { padding: 0 14px; height: 50px; }
    .nav-subtitle { display: none; }
    .container { padding: 12px; }
    .tabs-wrap { margin: 0 -12px; padding: 0 12px; overflow-x: auto; scrollbar-width: none; }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tabs { display: flex; flex-wrap: nowrap; width: max-content; }
    .tab { padding: 7px 12px; font-size: 12px; }
    .modal { max-width: 100%; padding: 18px; max-height: 90vh; }
    .form-row { grid-template-columns: 1fr; }
    .card { padding: 14px; }
    th, td { padding: 8px 6px; font-size: 11px; }
    .btn { font-size: 11px; padding: 6px 10px; }
  }

  @media (max-width: 420px) {
    .nav { padding: 0 10px; }
    .nav-title { font-size: 13px; }
    .nav-icon { width: 28px; height: 28px; font-size: 13px; }
    .card { padding: 12px; }
    .btn { font-size: 10px; padding: 5px 8px; min-height: 36px; }
    .td-actions { flex-direction: column; gap: 3px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="nav-icon">&#9881;</div>
    <div>
      <div class="nav-title">后台管理系统</div>
      <div class="nav-subtitle">数据编辑与管理</div>
    </div>
  </div>
  <div class="nav-right">
    <a href="index.html" class="nav-link">&#8592; 返回前台</a>
  </div>
</nav>

<div class="container">

  <div class="status-bar saved" id="statusBar">
    <span>&#10003;</span> 数据已从本地加载
  </div>

  <div class="tabs-wrap">
    <div class="tabs" id="adminTabs">
      <button class="tab active" onclick="switchTab('students', this)">&#128100; 学生管理</button>
      <button class="tab" onclick="switchTab('lessons', this)">&#128218; 班课管理</button>
      <button class="tab" onclick="switchTab('announcements', this)">&#128227; 公告管理</button>
    </div>
  </div>

  <!-- ========== 学生管理 ========== -->
  <div id="panel-students" class="panel active">
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:var(--font-sm);color:var(--text-secondary);flex:1;">点击展开可管理排课、课件和错题</span>
      <button class="btn warning" onclick="resetAll()">&#8634; 恢复默认数据</button>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>姓名</th><th>年级</th><th>当前章节</th><th>进度</th><th>状态</th><th>操作</th></tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ========== 班课管理 ========== -->
  <div id="panel-lessons" class="panel">
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;">
      <span style="font-size:var(--font-sm);color:var(--text-secondary);flex:1;">管理班级课程表和成绩</span>
      <button class="btn primary" onclick="openLessonModal()">+ 添加班课</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>课次</th><th>标题</th><th>日期</th><th>时间</th><th>状态</th><th>作业</th><th>操作</th></tr>
          </thead>
          <tbody id="lessonTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ========== 公告管理 ========== -->
  <div id="panel-announcements" class="panel">
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;">
      <span style="font-size:var(--font-sm);color:var(--text-secondary);flex:1;">管理班级公告信息</span>
      <button class="btn primary" onclick="openAnnounceModal()">+ 添加公告</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>标题</th><th>内容</th><th>日期</th><th>颜色</th><th>操作</th></tr>
          </thead>
          <tbody id="announceTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- ========== Modal 容器 ========== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

// ==================== 运行时数据 ====================
var students = [];
var classLessons = [];
var classAnnouncements = [];
var currentTab = 'students';

function loadData() {
  try {
    students = JSON.parse(localStorage.getItem('tb_students')) || JSON.parse(JSON.stringify(DEFAULT_STUDENTS));
    classLessons = JSON.parse(localStorage.getItem('tb_classLessons')) || JSON.parse(JSON.stringify(DEFAULT_LESSONS));
    classAnnouncements = JSON.parse(localStorage.getItem('tb_classAnnouncements')) || JSON.parse(JSON.stringify(DEFAULT_ANNOUNCEMENTS));
  } catch(e) {
    students = JSON.parse(JSON.stringify(DEFAULT_STUDENTS));
    classLessons = JSON.parse(JSON.stringify(DEFAULT_LESSONS));
    classAnnouncements = JSON.parse(JSON.stringify(DEFAULT_ANNOUNCEMENTS));
  }
}

function saveData() {
  try {
    localStorage.setItem('tb_students', JSON.stringify(students));
    localStorage.setItem('tb_classLessons', JSON.stringify(classLessons));
    localStorage.setItem('tb_classAnnouncements', JSON.stringify(classAnnouncements));
    showToast('已保存');
  } catch(e) { showToast('保存失败，存储空间不足'); }
}

function resetAll() {
  if (!confirm('确定要恢复为默认数据吗？所有修改将丢失！')) return;
  students = JSON.parse(JSON.stringify(DEFAULT_STUDENTS));
  classLessons = JSON.parse(JSON.stringify(DEFAULT_LESSONS));
  classAnnouncements = JSON.parse(JSON.stringify(DEFAULT_ANNOUNCEMENTS));
  saveData();
  renderAll();
  showToast('已恢复默认数据');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

// ==================== 标签切换 ====================
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('#adminTabs .tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
  renderAll();
}

// ==================== Modal ====================
function openModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

// ==================== 渲染所有 ====================
function renderAll() {
  if (currentTab === 'students') renderStudents();
  else if (currentTab === 'lessons') renderLessons();
  else if (currentTab === 'announcements') renderAnnouncements();
}

// ==================== 学生管理 ====================
var expandedStudent = -1;

function toggleExpand(sid) {
  expandedStudent = expandedStudent === sid ? -1 : sid;
  renderStudents();
}

function renderStudents() {
  var html = '';
  for (var i = 0; i < students.length; i++) {
    var s = students[i];
    var pct = Math.round(s.mathCourse.done / s.mathCourse.total * 100);
    html += '<tr>'
      + '<td><span class="color-dot" style="background:'+s.color+'"></span><strong>'+s.name+'</strong></td>'
      + '<td>'+s.grade+'</td>'
      + '<td>'+s.mathCourse.chapter+'</td>'
      + '<td>'+pct+'% ('+s.mathCourse.done+'/'+s.mathCourse.total+')</td>'
      + '<td><span class="badge" style="background:'+s.mathCourse.statusBg+';color:'+s.mathCourse.statusColor+'">'+s.mathCourse.status+'</span></td>'
      + '<td><div class="td-actions">'
        + '<button class="btn sm" onclick="openStudentModal('+i+')">&#9998; 编辑</button>'
        + '<button class="btn sm" style="background:'+(expandedStudent===i?'var(--primary-bg)':'')+'" onclick="toggleExpand('+i+')">'+(expandedStudent===i?'收起':'展开')+' ('+(s.schedule.length+s.courseware.length+s.errors.length)+'项)</button>'
      + '</div></td>'
    + '</tr>';

    if (expandedStudent === i) {
      html += '<tr><td colspan="6" style="padding:0;border:none;">'
        + '<div class="expand-section">'

        // 排课
        + '<h4>&#128197; 上课时间 <button class="btn sm" onclick="openScheduleModal('+i+',-1)">+ 添加</button></h4>'
        + '<div class="sub-list">';
      for (var j = 0; j < s.schedule.length; j++) {
        var sc = s.schedule[j];
        html += '<div class="sub-item"><div class="info"><strong>'+sc.day+' '+sc.time+'</strong> — '+sc.subject+' ('+sc.teacher+' · '+sc.room+') <span class="badge" style="background:#F0EEFF;color:#6C5CE7">'+sc.type+'</span></div>'
          + '<div class="td-actions"><button class="btn sm" onclick="openScheduleModal('+i+','+j+')">&#9998;</button><button class="btn sm danger" onclick="delSchedule('+i+','+j+')">&#10005;</button></div></div>';
      }
      html += '</div>'

        // 课件
        + '<h4 style="margin-top:12px;">&#128218; 课件 <button class="btn sm" onclick="openCoursewareModal('+i+',-1)">+ 添加</button></h4>'
        + '<div class="sub-list">';
      for (var k = 0; k < s.courseware.length; k++) {
        var cw = s.courseware[k];
        html += '<div class="sub-item"><div class="info"><strong>'+cw.name+'</strong> — '+cw.type+' · '+cw.date+' <span class="badge" style="background:'+cw.tagBg+';color:'+cw.tagColor+'">'+cw.tag+'</span> 进度:'+cw.progress+'%</div>'
          + '<div class="td-actions"><button class="btn sm" onclick="openCoursewareModal('+i+','+k+')">&#9998;</button><button class="btn sm danger" onclick="delCourseware('+i+','+k+')">&#10005;</button></div></div>';
      }
      html += '</div>'

        // 错题
        + '<h4 style="margin-top:12px;">&#10060; 错题 <button class="btn sm" onclick="openErrorModal('+i+',-1)">+ 添加</button></h4>'
        + '<div class="sub-list">';
      for (var m = 0; m < s.errors.length; m++) {
        var er = s.errors[m];
        html += '<div class="sub-item"><div class="info"><strong>'+er.tag+'</strong> — '+er.question.substring(0,30)+'... <span class="badge" style="background:'+(er.mastered?'var(--success-bg)':'var(--danger-bg)')+';color:'+(er.mastered?'var(--success)':'var(--danger)')+'">'+(er.mastered?'已掌握':'待复习')+'</span></div>'
          + '<div class="td-actions"><button class="btn sm" onclick="openErrorModal('+i+','+m+')">&#9998;</button><button class="btn sm danger" onclick="delError('+i+','+m+')">&#10005;</button></div></div>';
      }
      html += '</div>'

        + '</div></td></tr>';
    }
  }
  document.getElementById('studentTableBody').innerHTML = html;
}

    + '<div class="form-group"><label>题目</label><textarea id="f_erq">'+esc(er.question)+'</textarea></div>'
    + '<div class="form-group"><label>错误答案</label><textarea id="f_erw">'+esc(er.wrongAnswer)+'</textarea></div>'
    + '<div class="form-group"><label>正确解析</label><textarea id="f_erc">'+esc(er.correctAnswer)+'</textarea></div>'
    + '<div class="form-group"><label><input type="checkbox" id="f_erm" '+(er.mastered?'checked':'')+'> 已掌握</label></div>'
    + '<div class="form-actions"><button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="saveError('+sid+','+idx+')">保存</button></div>';
  openModal(html);
}

function saveError(sid, idx) {
  var er = { date: document.getElementById('f_erdate').value, question: document.getElementById('f_erq').value, wrongAnswer: document.getElementById('f_erw').value, correctAnswer: document.getElementById('f_erc').value, mastered: document.getElementById('f_erm').checked, tag: document.getElementById('f_ertag').value };
  if (idx >= 0) students[sid].errors[idx] = er; else students[sid].errors.push(er);
  saveData(); closeModal(); renderStudents(); showToast(idx>=0?'错题已更新':'错题已添加');
}

function delError(sid, idx) {
  if (!confirm('确定删除这道错题吗？')) return;
  students[sid].errors.splice(idx, 1);
  saveData(); renderStudents(); showToast('错题已删除');
}

// ==================== 班课管理 ====================
function renderLessons() {
  var html = '';
  for (var i = 0; i < classLessons.length; i++) {
    var l = classLessons[i];
    var avg = l.scores ? Math.round(l.scores.reduce(function(a,b){return a+b;},0)/l.scores.length) : '—';
    html += '<tr>'
      + '<td><strong>#'+l.num+'</strong></td>'
      + '<td>'+l.title+'</td>'
      + '<td>'+l.date+'</td>'
      + '<td>'+l.time+'</td>'
      + '<td><span class="badge" style="background:'+l.statusBg+';color:'+l.statusColor+'">'+l.status+'</span></td>'
      + '<td>'+l.homework+'</td>'
      + '<td><div class="td-actions"><button class="btn sm" onclick="openLessonModal('+i+')">&#9998;</button><button class="btn sm danger" onclick="delLesson('+i+')">&#10005;</button></div></td>'
    + '</tr>';
  }
  document.getElementById('lessonTableBody').innerHTML = html;
}

function openLessonModal(idx) {
  var l = idx >= 0 ? classLessons[idx] : { num: 21, title: '', date: '2026-07-10（周四）', time: '09:00-10:30', room: 'B301', status: '待上', statusColor: '#6C5CE7', statusBg: '#F0EEFF', homework: '', scores: null };
  var ss = l.scores || [0,0,0,0];
  var sNames = students.map(function(s){return s.name;});
  var html = '<button class="close-btn" onclick="closeModal()">&times;</button><h3>'+(idx>=0?'编辑班课':'添加班课')+'</h3>'
    + '<div class="form-row"><div class="form-group"><label>课次编号</label><input type="number" id="f_lnum" value="'+l.num+'"></div><div class="form-group"><label>标题</label><input id="f_ltitle" value="'+esc(l.title)+'"></div></div>'
    + '<div class="form-row"><div class="form-group"><label>日期</label><input id="f_ldate" value="'+esc(l.date)+'"></div><div class="form-group"><label>时间</label><input id="f_ltime" value="'+esc(l.time)+'"></div></div>'
    + '<div class="form-row"><div class="form-group"><label>教室</label><input id="f_lroom" value="'+esc(l.room)+'"></div><div class="form-group"><label>状态</label><select id="f_lstatus"><option value="已讲" '+(l.status==='已讲'?'selected':'')+'>已讲</option><option value="待上" '+(l.status==='待上'?'selected':'')+'>待上</option></select></div></div>'
    + '<div class="form-group"><label>作业</label><input id="f_lhomework" value="'+esc(l.homework)+'"></div>'
    + '<div class="form-group"><label>学生成绩（留空表示无成绩）</label>'
    + '<div class="form-row">';
    for (var j = 0; j < 4; j++) {
      html += '<div class="form-group"><label>'+sNames[j]+'</label><input type="number" id="f_lscore'+j+'" value="'+ss[j]+'" placeholder="分数"></div>';
    }
  html += '</div></div>'
    + '<div class="form-actions"><button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="saveLesson('+idx+')">保存</button></div>';
  openModal(html);
}

function saveLesson(idx) {
  var status = document.getElementById('f_lstatus').value;
  var sc = [parseInt(document.getElementById('f_lscore0').value)||0, parseInt(document.getElementById('f_lscore1').value)||0, parseInt(document.getElementById('f_lscore2').value)||0, parseInt(document.getElementById('f_lscore3').value)||0];
  var hasScores = document.getElementById('f_lscore0').value !== '' || document.getElementById('f_lscore1').value !== '' || document.getElementById('f_lscore2').value !== '' || document.getElementById('f_lscore3').value !== '';
  var l = {
    num: parseInt(document.getElementById('f_lnum').value) || 21,
    title: document.getElementById('f_ltitle').value,
    date: document.getElementById('f_ldate').value,
    time: document.getElementById('f_ltime').value,
    room: document.getElementById('f_lroom').value,
    status: status,
    statusColor: status === '已讲' ? '#00B894' : '#6C5CE7',
    statusBg: status === '已讲' ? '#E6F9F4' : '#F0EEFF',
    homework: document.getElementById('f_lhomework').value,
    scores: hasScores ? sc : null
  };
  if (idx >= 0) classLessons[idx] = l; else classLessons.push(l);
  saveData(); closeModal(); renderLessons(); showToast(idx>=0?'班课已更新':'班课已添加');
}

function delLesson(idx) {
  if (!confirm('确定删除这次班课吗？')) return;
  classLessons.splice(idx, 1);
  saveData(); renderLessons(); showToast('班课已删除');
}

// ==================== 公告管理 ====================
function renderAnnouncements() {
  var html = '';
  for (var i = 0; i < classAnnouncements.length; i++) {
    var a = classAnnouncements[i];
    html += '<tr>'
      + '<td><strong>'+a.title+'</strong></td>'
      + '<td>'+a.content+'</td>'
      + '<td>'+a.date+'</td>'
      + '<td><span class="color-dot" style="background:'+a.color+'"></span></td>'
      + '<td><div class="td-actions"><button class="btn sm" onclick="openAnnounceModal('+i+')">&#9998;</button><button class="btn sm danger" onclick="delAnnounce('+i+')">&#10005;</button></div></td>'
    + '</tr>';
  }
  document.getElementById('announceTableBody').innerHTML = html;
}

function openAnnounceModal(idx) {
  var a = idx >= 0 ? classAnnouncements[idx] : { title: '', content: '', date: '2026-06-25', color: '#6C5CE7', bg: '#F0EEFF' };
  var html = '<button class="close-btn" onclick="closeModal()">&times;</button><h3>'+(idx>=0?'编辑公告':'添加公告')+'</h3>'
    + '<div class="form-group"><label>标题</label><input id="f_atitle" value="'+esc(a.title)+'"></div>'
    + '<div class="form-group"><label>内容</label><textarea id="f_acontent">'+esc(a.content)+'</textarea></div>'
    + '<div class="form-row"><div class="form-group"><label>日期</label><input id="f_adate" value="'+esc(a.date)+'" type="date"></div><div class="form-group"><label>主题色</label><input type="color" id="f_acolor" value="'+a.color+'" style="width:60px;height:36px;padding:2px;"></div></div>'
    + '<div class="form-actions"><button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="saveAnnounce('+idx+')">保存</button></div>';
  openModal(html);
}

function saveAnnounce(idx) {
  var color = document.getElementById('f_acolor').value;
  var a = { title: document.getElementById('f_atitle').value, content: document.getElementById('f_acontent').value, date: document.getElementById('f_adate').value, color: color, bg: color + '22' };
  if (idx >= 0) classAnnouncements[idx] = a; else classAnnouncements.push(a);
  saveData(); closeModal(); renderAnnouncements(); showToast(idx>=0?'公告已更新':'公告已添加');
}

function delAnnounce(idx) {
  if (!confirm('确定删除这条公告吗？')) return;
  classAnnouncements.splice(idx, 1);
  saveData(); renderAnnouncements(); showToast('公告已删除');
}

// ==================== 工具函数 ====================
function esc(str) { return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ==================== 初始化 ====================
loadData();
renderStudents();
</script>
